name: Build PeyamApp APK

# اجرای خودکار با هر push، یا اجرای دستی از تب Actions
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      # این مرحله فایل google-services.json را از یک GitHub Secret (به صورت base64) می‌سازد
      # تا مجبور نباشی این فایل را مستقیم داخل ریپازیتوری commit کنی.
      # راهنمای ساخت این Secret در android/README.fa.md آمده.
      - name: Write google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: peyam-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
